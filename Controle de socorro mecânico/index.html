<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <title>CONTROLE DE SOCORRO</title>
</head>

<body>

    <!-- Aqui começa a div do cabeçalho -->

    <div id="cabecalho">
        <header>
            <div class="logo">
                <img src="imagens/logo.svg" alt="Logo da empresa">
            </div>

            <input type="text" id="pesquisa" placeholder="Buscar chamado, placa, endereço...">

            <i class="fa-solid fa-user"></i>
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-right-to-bracket"></i>


        </header>
    </div>

    <!-- Aqui acaba a div do cabeçalho -->

    <div class="pagina">

        <!-- Aqui começa a div da barra lateral -->

        <div class="sidebar">
            <ul>
                <li>
                    <p>PRINCIPAL</p>
                </li>
                <li><a href="#"><i class="fa-solid fa-house"></i> Dashboard</a></li>
                <li><a href="#"><i class="fa-solid fa-triangle-exclamation"></i> Chamados Ativos</a></li>
                <li><a href="#"><i class="fa-solid fa-map-location-dot"></i> Mapa ao Vivo</a></li>
                <hr>
                <li>
                    <p>GESTÃO</p>
                </li>
                <li><a href="#"><i class="fa-solid fa-truck"></i> Veiculos</a></li>
                <li><a href="#"><i class="fa-solid fa-people-group"></i> Equipes</a></li>
                <li><a href="#"><i class="fa-solid fa-chart-column"></i> Relatórios</a></li>
                <hr>
                <li>
                    <p>SISTEMA</p>
                </li>
                <li><a href="#"><i class="fa-solid fa-gear"></i> Configurações</a></li>
            </ul>
        </div>

        <!-- Aqui acaba a div da barra lateral -->

        <main>

            <!-- Aqui começa a div dos chamados de hoje -->
            <div class="chamados_hoje">
                <div class="card_topo">
                    <p>Chamados de Hoje</p>
                    <i class="fa-solid fa-phone-volume"></i>
                </div>

                <div class="card_inferior">
                    <p>18</p>
                </div>
            </div>
            <!-- Aqui acaba a div dos chamados de hoje -->

            <!-- Aqui começa a div dos chamados em atendimento -->
            <div class="chamados_hoje">
                <div class="card_topo">
                    <p>Em Atendimento</p>
                    <i class="fa-solid fa-truck-medical"></i>
                </div>

                <div class="card_inferior">
                    <p>3</p>
                </div>
            </div>
            <!-- Aqui acaba a div dos chamados em atendimento -->

            <!-- Aqui começa a div dos chamados resolvidos-->
            <div class="chamados_hoje">
                <div class="card_topo">
                    <p>Resolvidos</p>
                    <i class="fa-solid fa-circle-check"></i>
                </div>

                <div class="card_inferior">
                    <p>15</p>
                </div>
            </div>
            <!-- Aqui acaba a div dos chamados resolvidos-->

            <!-- Aqui começa a div do tempo médio por chamado-->
            <div class="chamados_hoje">
                <div class="card_topo">
                    <p>Tempo Médio por Chamado</p>
                    <i class="fa-regular fa-clock"></i>
                </div>
                <div class="card_inferior">
                    <div class="card_numero">
                        <h1>24</h1>
                        <p>min</p>
                    </div>
                        <div class="card_sub">
                            <p>Resposta para o chamado</p>
                        </div>
                    </div>
                </div>
            </div>
    </div>
    </div>
    <!-- Aqui acaba a div do tempo médio por chamado-->



    </main>

    </div>



</body>

</html>
